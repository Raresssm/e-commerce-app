spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "http://localhost:9099/realms/micro-services"
  data:
    mongodb:
      username: rares
      password: rares
      host: localhost
      port: 27017
      database: auth
      authentication-database: admin
  mail:
    host: localhost
    port: 1025
    username: rares
    password: rares
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

application:
  auth:
    frontend-base-url: ${AUTH_FRONTEND_BASE_URL:http://localhost:3000}
    mail-from: ${AUTH_MAIL_FROM:no-reply@ecommerce.local}
    reset-token-ttl-minutes: 30
    email-verification-ttl-hours: 24
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9099}
    realm: ${KEYCLOAK_REALM:micro-services}
    admin-realm: ${KEYCLOAK_ADMIN_REALM:master}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

springdoc:
  api-docs:
    path: /api/v1/auth/v3/api-docs

server:
  forward-headers-strategy: framework
  port: 8100
